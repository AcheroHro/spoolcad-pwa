<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SpoolCAD PWA</title>
<style>
:root { --primary: #2563eb; --primary-dark: #1d4ed8; --secondary: #64748b; --bg-app: #f1f5f9; --bg-panel: #ffffff; --text-main: #0f172a; --text-muted: #64748b; --border: #e2e8f0; --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); --radius: 12px; }
* { box-sizing: border-box; touch-action: manipulation; }
body { margin: 0; font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg-app); color: var(--text-main); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
.app-container { display: flex; flex-direction: column; height: 100%; width: 100%; }
.toolbar { background: var(--bg-panel); padding: 0.75rem; display: flex; justify-content: space-between; align-items: center; box-shadow: var(--shadow); z-index: 10; }
.tool-group { display: flex; gap: 0.5rem; }
.tool-btn, .action-btn { background: var(--bg-app); border: 1px solid var(--border); border-radius: var(--radius); padding: 0.6rem; cursor: pointer; font-size: 1.2rem; transition: all 0.2s ease; color: var(--text-main); display: flex; align-items: center; justify-content: center; }
.tool-btn:hover, .action-btn:hover { background: #e0e7ff; transform: translateY(-2px); border-color: var(--primary); }
.tool-btn.active { background: var(--primary); color: white; border-color: var(--primary); box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3); }
.action-btn.danger:hover { background: #fee2e2; border-color: #ef4444; color: #ef4444; }
.canvas-wrapper { flex: 1; position: relative; background: #ffffff; background-image: linear-gradient(#e2e8f0 1px, transparent 1px), linear-gradient(90deg, #e2e8f0 1px, transparent 1px); background-size: 20px 20px; overflow: hidden; }
#cad-canvas { display: block; width: 100%; height: 100%; cursor: crosshair; }
.coordinates-hud { position: absolute; bottom: 1rem; left: 1rem; background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(4px); padding: 0.5rem 1rem; border-radius: 20px; border: 1px solid var(--border); font-size: 0.85rem; color: var(--text-muted); display: flex; gap: 1rem; box-shadow: var(--shadow); pointer-events: none; }
.properties-panel { background: var(--bg-panel); padding: 1rem; border-top: 1px solid var(--border); display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; box-shadow: 0 -4px 6px -1px rgb(0 0 0 / 0.05); }
.prop-row { display: flex; flex-direction: column; gap: 0.3rem; }
.prop-row label { font-size: 0.8rem; color: var(--text-muted); font-weight: 600; }
.prop-row input { padding: 0.5rem; border: 1px solid var(--border); border-radius: 8px; font-size: 1rem; width: 100%; transition: border-color 0.2s; }
.prop-row input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1); }
dialog { border: none; border-radius: var(--radius); padding: 2rem; box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1); max-width: 90%; width: 400px; }
dialog::backdrop { background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(2px); }
.modal-content h2 { margin-top: 0; color: var(--primary); }
.modal-content ul { padding-left: 1.2rem; color: var(--text-muted); }
.modal-content .action-btn { width: 100%; margin-top: 1rem; background: var(--primary); color: white; border: none; font-weight: 600; }
@media (max-width: 600px) { .properties-panel { grid-template-columns: 1fr; gap: 0.5rem; } .tool-btn span { font-size: 1rem; } }
</style>
</head>
<body>
<div class="app-container">
<header class="toolbar">
<div class="tool-group">
<button id="btn-select" class="tool-btn active" title="Seleccionar"><span>↖️</span></button>
<button id="btn-line" class="tool-btn" title="Línea"><span>📏</span></button>
<button id="btn-pipe" class="tool-btn" title="Tubería"><span>🔵</span></button>
</div>
<div class="tool-group">
<button id="btn-undo" class="action-btn" title="Deshacer">↩️</button>
<button id="btn-clear" class="action-btn danger" title="Borrar Todo">🗑️</button>
</div>
</header>
<main class="canvas-wrapper">
<canvas id="cad-canvas"></canvas>
<div class="coordinates-hud">
<span id="coord-x">X: 0.00</span>
<span id="coord-y">Y: 0.00</span>
<span id="zoom-level">Zoom: 100%</span>
</div>
</main>
<aside class="properties-panel">
<div class="prop-row">
<label>Espesor (mm):</label>
<input type="number" id="prop-thickness" value="5.0" step="0.5">
</div>
<div class="prop-row">
<label>Diámetro ("): </label>
<input type="number" id="prop-diameter" value="2.0" step="0.5">
</div>
</aside>
</div>
<dialog id="help-modal">
<div class="modal-content">
<h2>SpoolCAD PWA</h2>
<p>Herramienta optimizada para dibujo de spools.</p>
<ul><li><strong>Toque doble:</strong> Centrar vista</li><li><strong>Pellizcar:</strong> Zoom</li><li><strong>Arrastrar:</strong> Mover lienzo</li></ul>
<button id="btn-close-modal" class="action-btn primary">Cerrar</button>
</div>
</dialog>
<script>
const canvas = document.getElementById('cad-canvas');
const ctx = canvas.getContext('2d', { alpha: false });
const coordX = document.getElementById('coord-x');
const coordY = document.getElementById('coord-y');
const zoomLevel = document.getElementById('zoom-level');
let state = { mode: 'select', elements: [], scale: 1.0, offsetX: 0, offsetY: 0, isDragging: false, lastX: 0, lastY: 0, startPoint: null, currentLine: null, animationFrameId: null };
function init() { resizeCanvas(); window.addEventListener('resize', resizeCanvas); setupEvents(); setupUI(); requestAnimationFrame(renderLoop); }
function resizeCanvas() { const parent = canvas.parentElement; canvas.width = parent.clientWidth; canvas.height = parent.clientHeight; render(); }
function renderLoop() { render(); state.animationFrameId = requestAnimationFrame(renderLoop); }
function render() { ctx.fillStyle = '#ffffff'; ctx.fillRect(0, 0, canvas.width, canvas.height); ctx.save(); ctx.translate(state.offsetX + canvas.width / 2, state.offsetY + canvas.height / 2); ctx.scale(state.scale, state.scale); ctx.lineWidth = 2 / state.scale; ctx.lineCap = 'round'; ctx.lineJoin = 'round'; for (const el of state.elements) { drawElement(el); } if (state.currentLine) { ctx.strokeStyle = '#2563eb'; ctx.setLineDash([5 / state.scale, 5 / state.scale]); ctx.beginPath(); ctx.moveTo(state.currentLine.x1, state.currentLine.y1); ctx.lineTo(state.currentLine.x2, state.currentLine.y2); ctx.stroke(); ctx.setLineDash([]); ctx.fillStyle = '#2563eb'; ctx.beginPath(); ctx.arc(state.currentLine.x2, state.currentLine.y2, 4 / state.scale, 0, Math.PI * 2); ctx.fill(); } ctx.restore(); }
function drawElement(el) { if (el.type === 'line' || el.type === 'pipe') { ctx.strokeStyle = el.type === 'pipe' ? '#0ea5e9' : '#334155'; ctx.lineWidth = (el.type === 'pipe' ? 4 : 2) / state.scale; ctx.beginPath(); ctx.moveTo(el.x1, el.y1); ctx.lineTo(el.x2, el.y2); ctx.stroke(); if (el.type === 'pipe') { ctx.fillStyle = '#0ea5e9'; ctx.font = `${12/state.scale}px sans-serif`; ctx.fillText(`${el.props.diameter}"`, (el.x1+el.x2)/2, (el.y1+el.y2)/2 - 5/state.scale); } } }
function setupEvents() { canvas.addEventListener('mousedown', onPointerDown); canvas.addEventListener('mousemove', onPointerMove); canvas.addEventListener('mouseup', onPointerUp); canvas.addEventListener('wheel', onWheel, { passive: false }); canvas.addEventListener('touchstart', onTouchStart, { passive: false }); canvas.addEventListener('touchmove', onTouchMove, { passive: false }); canvas.addEventListener('touchend', onPointerUp); }
function getCoords(e) { const rect = canvas.getBoundingClientRect(); let clientX, clientY; if (e.touches && e.touches.length > 0) { clientX = e.touches[0].clientX; clientY = e.touches[0].clientY; } else { clientX = e.clientX; clientY = e.clientY; } const x = (clientX - rect.left - (canvas.width / 2) - state.offsetX) / state.scale; const y = (clientY - rect.top - (canvas.height / 2) - state.offsetY) / state.scale; return { x, y, screenX: clientX, screenY: clientY }; }
function onPointerDown(e) { if (e.button !== 0 && e.type === 'mousedown') return; const coords = getCoords(e); state.isDragging = true; state.lastX = coords.screenX; state.lastY = coords.screenY; if (state.mode === 'line' || state.mode === 'pipe') { if (!state.startPoint) { state.startPoint = { x: coords.x, y: coords.y }; state.currentLine = { x1: coords.x, y1: coords.y, x2: coords.x, y2: coords.y }; } else { finalizeElement(coords.x, coords.y); } render(); } }
function onPointerMove(e) { const coords = getCoords(e); coordX.textContent = `X: ${coords.x.toFixed(2)}`; coordY.textContent = `Y: ${coords.y.toFixed(2)}`; if (state.isDragging) { if (state.mode === 'select' || (state.mode !== 'select' && !state.startPoint)) { const dx = coords.screenX - state.lastX; const dy = coords.screenY - state.lastY; state.offsetX += dx; state.offsetY += dy; state.lastX = coords.screenX; state.lastY = coords.screenY; render(); } else if (state.currentLine) { state.currentLine.x2 = coords.x; state.currentLine.y2 = coords.y; render(); } } }
function onPointerUp() { state.isDragging = false; }
function onWheel(e) { e.preventDefault(); const zoomSensitivity = 0.001; const delta = -e.deltaY * zoomSensitivity; const newScale = Math.min(Math.max(0.1, state.scale + delta), 10); state.scale = newScale; zoomLevel.textContent = `Zoom: ${Math.round(state.scale * 100)}%`; render(); }
let initialPinchDistance = null; let initialScale = 1;
function onTouchStart(e) { if (e.touches.length === 2) { initialPinchDistance = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY); initialScale = state.scale; state.isDragging = false; } else { onPointerDown(e); } }
function onTouchMove(e) { e.preventDefault(); if (e.touches.length === 2 && initialPinchDistance) { const dist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY); const delta = (dist - initialPinchDistance) * 0.01; state.scale = Math.min(Math.max(0.1, initialScale + delta), 10); zoomLevel.textContent = `Zoom: ${Math.round(state.scale * 100)}%`; render(); } else { onPointerMove(e); } }
function finalizeElement(x, y) { const thickness = parseFloat(document.getElementById('prop-thickness').value); const diameter = parseFloat(document.getElementById('prop-diameter').value); state.elements.push({ type: state.mode, x1: state.startPoint.x, y1: state.startPoint.y, x2: x, y2: y, props: { thickness, diameter } }); state.startPoint = null; state.currentLine = null; render(); }
function setupUI() { const modes = ['select', 'line', 'pipe']; modes.forEach(mode => { const btn = document.getElementById(`btn-${mode}`); btn.addEventListener('click', () => { state.mode = mode; state.startPoint = null; state.currentLine = null; document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); }); }); document.getElementById('btn-undo').addEventListener('click', () => { state.elements.pop(); render(); }); document.getElementById('btn-clear').addEventListener('click', () => { if(confirm('¿Borrar todo?')) { state.elements = []; render(); } }); ['prop-thickness', 'prop-diameter'].forEach(id => { document.getElementById(id).addEventListener('change', render); }); }
init();
</script>
</body>
</html>
