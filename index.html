<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Achero_Spool</title>
  <link rel="stylesheet" href="./styles.css">
  <link rel="manifest" href="./manifest.json">
</head>
<body>

  <!-- Barra Superior -->
  <header id="top-bar">
    <span class="project-name">Achero_Spool</span>
    <div class="top-actions">
      <button id="btn-save" class="top-btn">GUARDAR</button>
      <button id="btn-bom" class="top-btn">MATERIALES</button>
      <button id="btn-export" class="top-btn">EXPORTAR</button>
    </div>
  </header>

  <!-- Área de Trabajo -->
  <main id="workspace">
    <canvas id="cad-canvas"></canvas>
    
    <!-- Panel Lateral Derecho -->
    <aside id="right-toolbar">
      <button class="tool-btn active" data-tool="pan">PUNTERO</button>
      <button class="tool-btn" data-tool="line">CAÑERÍA</button>
      
      <div class="tool-group-title">ACCESORIOS</div>
      <button class="tool-btn" data-tool="elbow90">Codo 90°</button>
      <button class="tool-btn" data-tool="elbow45">Codo 45°</button>
      <button class="tool-btn" data-tool="tee">Tee</button>
      <button class="tool-btn" data-tool="cap">Casquete</button>
      <button class="tool-btn" data-tool="red-conc">Red. Conc</button>
      <button class="tool-btn" data-tool="red-exc">Red. Exc</button>
      <button class="tool-btn" data-tool="flange">Brida</button>
    </aside>
  </main>

  <!-- Modal de Materiales -->
  <div id="bom-modal">
    <div class="modal-content">
      <h3>Listado de Materiales</h3>
      <table id="bom-table">
        <thead><tr><th>#</th><th>Tipo</th><th>Diám</th><th>Long (mm)</th></tr></thead>
        <tbody id="bom-body"></tbody>
      </table>
      <button class="top-btn" onclick="toggleBOM()" style="width:100%; margin-top:15px;">CERRAR</button>
    </div>
  </div>

  <script src="./app.js"></script>
</body>
</html>
